<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Городской симулятор — Миникарта</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: #87CEEB;
            color: white;
        }

        #hud {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 12px 24px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            text-align: center;
            pointer-events: none;
            user-select: none;
            min-width: 200px;
        }
        #hud .speed {
            font-size: 2rem;
            font-weight: 700;
            color: #ff6b35;
        }
        #hud .speed small {
            font-size: 1rem;
            font-weight: 400;
            color: #888;
        }
        #hud .coords {
            font-size: 0.8rem;
            color: #88ddff;
            font-family: 'Courier New', monospace;
            margin-top: 4px;
        }
        #hud .model-name {
            font-size: 0.9rem;
            color: #ff6b35;
            font-weight: 500;
            margin-top: 2px;
        }

        #controls-hint {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(6px);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 0.8rem;
            color: #aaa;
            border: 1px solid rgba(255, 255, 255, 0.05);
            pointer-events: none;
            user-select: none;
            white-space: nowrap;
        }
        #controls-hint strong {
            color: #fff;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            text-align: center;
            pointer-events: none;
        }
        #loading .spinner {
            width: 50px;
            height: 50px;
            margin: 0 auto 16px;
            border: 4px solid rgba(255, 255, 255, 0.08);
            border-top: 4px solid #ff6b35;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        #loading p {
            font-size: 1rem;
            opacity: 0.7;
        }

        /* ===== КНОПКА ОТКРЫТИЯ МЕНЮ МАШИН ===== */
        #menuToggle {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 15;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            border: 2px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            font-size: 1.6rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }
        #menuToggle:hover {
            background: rgba(255, 107, 53, 0.3);
            border-color: #ff6b35;
            transform: scale(1.08);
        }

        /* ===== МЕНЮ МАШИН (всплывающее) ===== */
        #carSelector {
            position: absolute;
            top: 80px;
            left: 20px;
            z-index: 15;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            min-width: 220px;
            max-height: calc(100vh - 120px);
            overflow: hidden;
            display: none;
            flex-direction: column;
            padding: 12px 16px 16px 16px;
            gap: 8px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
        }
        #carSelector.open {
            display: flex;
        }

        .car-selector-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: default;
            user-select: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 8px;
        }
        .car-selector-header h4 {
            color: #888;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0;
        }
        .car-selector-header .close-menu {
            background: none;
            border: none;
            color: #888;
            font-size: 1.2rem;
            cursor: pointer;
        }
        .car-selector-header .close-menu:hover {
            color: #fff;
        }

        .car-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: calc(100vh - 280px);
            overflow-y: auto;
            padding-right: 4px;
        }
        .car-list::-webkit-scrollbar {
            width: 4px;
        }
        .car-list::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
        }
        .car-list::-webkit-scrollbar-thumb {
            background: #ff6b35;
            border-radius: 4px;
        }

        .car-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid transparent;
            color: #fff;
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
            text-align: left;
            font-weight: 400;
            width: 100%;
            white-space: nowrap;
        }
        .car-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        .car-btn.active {
            background: rgba(255, 107, 53, 0.2);
            border-color: #ff6b35;
        }
        .car-btn .emoji {
            margin-right: 8px;
        }
        .car-btn .credit {
            display: block;
            font-size: 0.5rem;
            color: #666;
            margin-top: 2px;
            padding-left: 4px;
            line-height: 1.3;
            white-space: normal;
        }
        .car-btn .locked {
            color: #ff6b35;
            font-size: 0.6rem;
            margin-left: 6px;
        }

        .promo-block {
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding-top: 10px;
            margin-top: 6px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .promo-block label {
            color: #aaa;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .promo-row {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .promo-row input {
            flex: 1;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 0.85rem;
            outline: none;
        }
        .promo-row input:focus {
            border-color: #ff6b35;
        }
        .promo-row button {
            background: #ff6b35;
            border: none;
            color: #fff;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.3s;
            white-space: nowrap;
        }
        .promo-row button:hover {
            background: #ff7a4a;
        }
        .promo-message {
            font-size: 0.7rem;
            color: #88ddff;
            min-height: 1.2em;
        }
        .promo-message.error {
            color: #ff6b6b;
        }
        .promo-message.success {
            color: #88ff88;
        }

        /* ===== ГАРАЖ ===== */
        #garagePanel {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 12;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            padding: 16px 24px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: none;
            min-width: 350px;
            max-width: 550px;
            text-align: center;
            gap: 12px;
            flex-direction: column;
        }
        #garagePanel h4 {
            color: #ff6b35;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
        }
        #garagePanel .garage-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            align-items: center;
        }
        #garagePanel .garage-row label {
            color: #aaa;
            font-size: 0.75rem;
        }
        #garagePanel input[type="color"] {
            width: 40px;
            height: 40px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            cursor: pointer;
            background: none;
            padding: 2px;
        }
        #garagePanel input[type="color"]:hover {
            border-color: #ff6b35;
        }
        #garagePanel .garage-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        #garagePanel .garage-btn:hover {
            background: rgba(255, 107, 53, 0.2);
            border-color: #ff6b35;
        }
        #garagePanel .garage-btn.primary {
            background: #ff6b35;
            border-color: #ff6b35;
            font-weight: 500;
        }
        #garagePanel .garage-btn.primary:hover {
            background: #ff7a4a;
        }
        #garagePanel .close-garage {
            position: absolute;
            top: 4px;
            right: 10px;
            background: none;
            border: none;
            color: #888;
            font-size: 1.2rem;
            cursor: pointer;
        }
        #garagePanel .close-garage:hover {
            color: #fff;
        }
        #garagePanel .texture-presets {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
        }
        #garagePanel .texture-presets .texture-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 6px;
            padding: 4px 10px;
            font-size: 0.65rem;
            color: #ccc;
            cursor: pointer;
            transition: all 0.3s;
            max-width: 100px;
            word-wrap: break-word;
            text-align: center;
            line-height: 1.2;
        }
        #garagePanel .texture-presets .texture-btn:hover {
            background: rgba(255, 107, 53, 0.2);
            border-color: #ff6b35;
            color: #fff;
        }
        #garagePanel .texture-presets .texture-btn.active {
            background: rgba(255, 107, 53, 0.3);
            border-color: #ff6b35;
            color: #fff;
        }
        #garagePanel .rotate-controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            align-items: center;
        }
        #garagePanel .rotate-controls .rot-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            padding: 6px 16px;
            border-radius: 8px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        #garagePanel .rotate-controls .rot-btn:hover {
            background: rgba(255, 107, 53, 0.3);
            border-color: #ff6b35;
        }

        /* ===== КНОПКА ГАРАЖА ===== */
        #garageToggle {
            position: absolute;
            bottom: 100px;
            right: 30px;
            z-index: 11;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            border: 2px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            font-size: 1.4rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }
        #garageToggle:hover {
            background: rgba(255, 107, 53, 0.3);
            border-color: #ff6b35;
            transform: scale(1.08);
        }

        #creditPanel {
            position: absolute;
            bottom: 135px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(6px);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.6rem;
            color: #888;
            border: 1px solid rgba(255, 255, 255, 0.05);
            pointer-events: none;
            user-select: none;
            text-align: center;
            max-width: 90%;
            line-height: 1.4;
        }
        #creditPanel a {
            color: #88ccff;
            pointer-events: auto;
        }

        /* ===== МИНИКАРТА ===== */
        #minimap {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 10;
            width: 180px;
            height: 180px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 12px;
            border: 2px solid rgba(255, 255, 255, 0.15);
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            pointer-events: none;
        }
        #minimap canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        #minimap-label {
            position: absolute;
            bottom: 4px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.5rem;
            color: rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
            pointer-events: none;
            user-select: none;
        }

        @media (max-width: 768px) {
            #hud { padding: 8px 16px; min-width: auto; width: 90%; bottom: 16px; }
            #hud .speed { font-size: 1.5rem; }
            #controls-hint { font-size: 0.6rem; padding: 6px 14px; white-space: normal; max-width: 90%; top: 12px; }
            #menuToggle { top: 12px; left: 12px; width: 44px; height: 44px; font-size: 1.3rem; }
            #carSelector { left: 10px; top: 70px; min-width: 180px; max-height: calc(100vh - 140px); padding: 10px 12px; }
            .car-btn { font-size: 0.75rem; padding: 5px 8px; }
            .promo-row input { font-size: 0.75rem; padding: 4px 8px; }
            .promo-row button { font-size: 0.7rem; padding: 4px 10px; }
            #garagePanel { bottom: 80px; min-width: 90%; padding: 12px 16px; }
            #garageToggle { bottom: 80px; right: 15px; width: 42px; height: 42px; font-size: 1.2rem; }
            #garagePanel .texture-presets .texture-btn { font-size: 0.55rem; padding: 3px 6px; max-width: 70px; }
            #minimap { width: 120px; height: 120px; top: 12px; right: 12px; }
        }
    </style>
</head>
<body>

    <!-- КНОПКА ОТКРЫТИЯ МЕНЮ МАШИН -->
    <div id="menuToggle">🚗</div>

    <!-- МЕНЮ МАШИН (всплывающее) -->
    <div id="carSelector">
        <div class="car-selector-header">
            <h4>🚗 ВЫБОР МАШИНЫ</h4>
            <button class="close-menu" id="closeMenu">✕</button>
        </div>
        <div class="car-list" id="carList"></div>
        <div class="promo-block">
            <label>🔑 Промокод</label>
            <div class="promo-row">
                <input type="text" id="promoInput" placeholder="Введите код" />
                <button id="promoBtn">Активировать</button>
            </div>
            <div class="promo-message" id="promoMessage"></div>
        </div>
    </div>

    <!-- МИНИКАРТА -->
    <div id="minimap">
        <canvas id="minimapCanvas"></canvas>
        <div id="minimap-label">MAP</div>
    </div>

    <div id="controls-hint">
        <strong>W / ↑</strong> — назад &nbsp;·&nbsp; <strong>S / ↓</strong> — вперёд &nbsp;·&nbsp; <strong>A / ←</strong> &nbsp;<strong>D / →</strong> — руль &nbsp;·&nbsp; <strong>Пробел</strong> — ручник
    </div>

    <!-- Кнопка гаража -->
    <div id="garageToggle">🔧</div>

    <!-- ГАРАЖ -->
    <div id="garagePanel">
        <button class="close-garage" id="closeGarage">✕</button>
        <h4>🔧 ГАРАЖ</h4>
        <div class="garage-row">
            <label>🎨 Цвет:</label>
            <input type="color" id="colorPicker" value="#ff6b35" />
            <button class="garage-btn" id="applyColorBtn">Применить</button>
            <button class="garage-btn" id="resetColorBtn">Сбросить</button>
        </div>
        <div class="garage-row">
            <label>🔄 Вращение:</label>
            <div class="rotate-controls">
                <button class="rot-btn" id="rotLeft">⟲ Влево</button>
                <button class="rot-btn" id="rotRight">⟳ Вправо</button>
                <button class="rot-btn" id="rotReset">↺ Сброс</button>
            </div>
        </div>
        <div class="garage-row">
            <label>📄 Текстуры:</label>
            <div class="texture-presets" id="texturePresets"></div>
        </div>
        <div class="garage-row">
            <label>📁 Своё изображение:</label>
            <div class="file-input-wrapper" style="position:relative;overflow:hidden;display:inline-block;">
                <button class="garage-btn primary">Выбрать файл</button>
                <input type="file" id="stickerFileInput" accept="image/*" style="position:absolute;left:0;top:0;opacity:0;width:100%;height:100%;cursor:pointer;" />
            </div>
        </div>
    </div>

    <div id="creditPanel">
        🏙️ Модель города: "Tiny City" by Matheus Dalla · CC BY &nbsp;|&nbsp; 🚗 Модели: <span id="creditText">BEEMWA 22 — © tonielpro520 · CC BY</span>
    </div>

    <div id="hud">
        <div class="speed"><span id="speedDisplay">0</span> <small>км/ч</small></div>
        <div class="coords" id="coordDisplay">📍 0.00 · 0.00 · 0.00</div>
        <div class="model-name" id="modelNameDisplay">🚗 BEEMWA 22</div>
    </div>

    <div id="loading">
        <div class="spinner"></div>
        <p id="loadStatus">Загрузка...</p>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --------------------------------------------------------------
        // 1. СЦЕНА, КАМЕРА, РЕНДЕРЕР
        // --------------------------------------------------------------
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(0, 3, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.5;
        document.body.appendChild(renderer.domElement);

        // --------------------------------------------------------------
        // 2. ОСВЕЩЕНИЕ
        // --------------------------------------------------------------
        const sunLight = new THREE.DirectionalLight(0xffeedd, 2.5);
        sunLight.position.set(30, 40, 20);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 4096;
        sunLight.shadow.mapSize.height = 4096;
        sunLight.shadow.camera.near = 0.1;
        sunLight.shadow.camera.far = 100;
        sunLight.shadow.camera.left = -50;
        sunLight.shadow.camera.right = 50;
        sunLight.shadow.camera.top = 50;
        sunLight.shadow.camera.bottom = -50;
        scene.add(sunLight);

        const fillLight = new THREE.DirectionalLight(0x88ccff, 0.8);
        fillLight.position.set(-20, 10, -30);
        scene.add(fillLight);

        const ambientLight = new THREE.AmbientLight(0x88bbdd, 0.8);
        scene.add(ambientLight);

        // --------------------------------------------------------------
        // 3. КАРТА (уменьшенное поле + город)
        // --------------------------------------------------------------
        const WORLD_SIZE = 180;
        const BOUNDARY = WORLD_SIZE / 2 - 2;

        // Подложка для теней
        const groundGeo = new THREE.PlaneGeometry(WORLD_SIZE, WORLD_SIZE);
        const groundMat = new THREE.ShadowMaterial({ opacity: 0.3, color: 0x000000 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.5;
        ground.receiveShadow = true;
        scene.add(ground);

        // Сетка
        const gridHelper = new THREE.GridHelper(WORLD_SIZE, 20, 0x88dd88, 0x44aa44);
        gridHelper.position.y = -0.48;
        scene.add(gridHelper);

        // Маркер в центре
        const markerGeo = new THREE.RingGeometry(0.5, 0.8, 32);
        const markerMat = new THREE.MeshBasicMaterial({ color: 0xff6b35, side: THREE.DoubleSide, transparent: true,
            opacity: 0.5 });
        const marker = new THREE.Mesh(markerGeo, markerMat);
        marker.rotation.x = -Math.PI / 2;
        marker.position.y = -0.47;
        scene.add(marker);

        // --------------------------------------------------------------
        // 4. ЗАГРУЗКА МОДЕЛИ ГОРОДА
        // --------------------------------------------------------------
        const cityLoader = new GLTFLoader();
        cityLoader.load(
            'tiny_city.glb',
            (gltf) => {
                const city = gltf.scene;
                const box = new THREE.Box3().setFromObject(city);
                const size = box.getSize(new THREE.Vector3());
                const maxDim = Math.max(size.x, size.y, size.z);
                const targetSize = WORLD_SIZE * 0.9;
                const scale = targetSize / maxDim;
                city.scale.set(scale, scale, scale);
                const center = new THREE.Vector3();
                box.getCenter(center);
                city.position.sub(center.multiplyScalar(scale));
                const newBox = new THREE.Box3().setFromObject(city);
                const minY = newBox.min.y;
                city.position.y = -0.5 - minY;
                city.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });
                scene.add(city);
                console.log('✅ Город загружен');
            },
            (xhr) => {
                const percent = Math.round((xhr.loaded / xhr.total) * 100);

        function loadModel(modelId, filePath) {
            return new Promise((resolve, reject) => {
                const modelInfo = modelsList.find(m => m.id === modelId);
                loadStatus.textContent = `Загрузка ${modelInfo.emoji} ${modelInfo.name}...`;
                loader.load(filePath, (gltf) => {
                    const model = gltf.scene;
                    const box = new THREE.Box3().setFromObject(model);
                    const size = box.getSize(new THREE.Vector3());
                    const maxDim = Math.max(size.x, size.y, size.z);
                    let targetSize = modelInfo.isCybertruck ? 4.0 : 2.0;
                    if (maxDim > 0.01) {
                        const s = targetSize / maxDim;
                        model.scale.set(s, s, s);
                    }
                    const center = new THREE.Vector3();
                    box.getCenter(center);
                    model.position.sub(center);
                    const newBox = new THREE.Box3().setFromObject(model);
                    const minY = newBox.min.y;
                    model.position.y = -minY;
                    model.rotation.y = modelInfo.rotation || 0;
                    model.traverse((child) => {
                        if (child.isMesh) {
                            child.castShadow = true;
                            child.receiveShadow = true;
                            if (child.material) {
                                child.material.roughness = 0.3;
                                child.material.metalness = 0.5;
                            }
                        }
                    });
                    scene.add(model);
                    resolve(model);
                }, (xhr) => {
                    const percent = Math.round((xhr.loaded / xhr.total) * 100);
                    loadStatus.textContent = `Загрузка... ${percent}%`;
                }, (error) => {
                    console.error('Ошибка загрузки:', error);
                    reject(error);
                });
            });
        }

        function updateCar() {
            if (!currentCar || !carLoaded) return;
            const { position, velocity, rotation } = carState;
            const modelInfo = modelsList.find(m => m.id === currentModelId);
            const isTank = modelInfo ? modelInfo.isTank : false;

            let acceleration = 0;
            let turn = 0;
            if (keys.w || keys.up) acceleration = -ENGINE_FORCE;
            if (keys.s || keys.down) acceleration = REVERSE_FORCE;
            if (keys.a || keys.left) turn = TURN_SPEED;
            if (keys.d || keys.right) turn = -TURN_SPEED;

            if (Math.abs(velocity.length()) > 0.005) carState.rotation += turn;
            const forward = new THREE.Vector3(-Math.sin(rotation), 0, -Math.cos(rotation));
            velocity.add(forward.clone().multiplyScalar(acceleration));

            const currentSpeed = velocity.length();
            const maxSpeed = isTank ? TANK_MAX_SPEED : MAX_SPEED;
            if (currentSpeed > maxSpeed) velocity.multiplyScalar(maxSpeed / currentSpeed);
            velocity.multiplyScalar(FRICTION);
            if (velocity.length() < 0.001) velocity.set(0, 0, 0);
            position.add(velocity);

            if (Math.abs(position.x) > BOUNDARY) {
                position.x = Math.sign(position.x) * BOUNDARY;
                velocity.x = 0;
            }
            if (Math.abs(position.z) > BOUNDARY) {
                position.z = Math.sign(position.z) * BOUNDARY;
                velocity.z = 0;
            }

            currentCar.position.copy(position);
            const baseRotation = modelInfo ? modelInfo.rotation || 0 : 0;
            currentCar.rotation.y = rotation + baseRotation;
            if (Math.abs(turn) > 0.001 && velocity.length() > 0.05) {
                const tilt = -turn * velocity.length() * 0.5;
                currentCar.rotation.z = tilt;
            } else {
                currentCar.rotation.z *= 0.9;
            }
            currentCar.position.y = 0;

            const speedKmh = Math.round(velocity.length() * 150);
            document.getElementById('speedDisplay').textContent = speedKmh;
            document.getElementById('coordDisplay').textContent =
                `📍 ${position.x.toFixed(2)} · ${position.y.toFixed(2)} · ${position.z.toFixed(2)}`;
        }

        function updateCamera() {

            const carPos = currentCar.position.clone();
            const modelInfo = modelsList.find(m => m.id === currentModelId);
            const isCybertruck = modelInfo ? modelInfo.isCybertruck : false;
            const speed = carState.velocity.length();
            const distanceFactor = Math.min(speed / MAX_SPEED, 1);
            let currentDistance, currentHeight;
            if (isCybertruck) {
                currentDistance = CYBERTRUCK_CAMERA_DISTANCE;
                currentHeight = CYBERTRUCK_CAMERA_HEIGHT;
            } else {
                currentDistance = CAMERA_DISTANCE_MIN + (CAMERA_DISTANCE_MAX - CAMERA_DISTANCE_MIN) * distanceFactor * 0.5;
                currentHeight = CAMERA_HEIGHT;
            }
            const angle = carState.rotation;
            const offset = new THREE.Vector3(
                -Math.sin(angle) * currentDistance,
                currentHeight,
                -Math.cos(angle) * currentDistance
            );
            const desiredPos = carPos.clone().add(offset);
            camera.position.lerp(desiredPos, CAMERA_SMOOTH);
            const lookTarget = carPos.clone();
            lookTarget.y += isCybertruck ? 1.0 : 0.5;
            cameraTarget.lerp(lookTarget, CAMERA_SMOOTH);
            camera.lookAt(cameraTarget);
        }

        // --------------------------------------------------------------
        // 13. МИНИКАРТА (с 5 улицами)
        // --------------------------------------------------------------
        const minimapCanvas = document.getElementById('minimapCanvas');
        const ctx = minimapCanvas.getContext('2d');

        function resizeMinimap() {
            const rect = document.getElementById('minimap').getBoundingClientRect();
            const size = rect.width || 180;
            minimapCanvas.width = size;
            minimapCanvas.height = size;
            minimapCanvas.style.width = size + 'px';
            minimapCanvas.style.height = size + 'px';
        }
        resizeMinimap();
        window.addEventListener('resize', resizeMinimap);

        function updateMinimap() {
            const rect = document.getElementById('minimap').getBoundingClientRect();
            const size = rect.width || 180;
            const canvas = minimapCanvas;
            const ctx = canvas.getContext('2d');

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = 'rgba(20, 25, 35, 0.85)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const halfWorld = BOUNDARY;

            function toMapX(x) {
                return (x + halfWorld) / (halfWorld * 2) * canvas.width;
            }

            function toMapY(z) {
                return (z + halfWorld) / (halfWorld * 2) * canvas.height;
            }

            // === ВСЕ 5 УЛИЦ ===
            // Улица 1: от (11.21, -68.25) до (11.21, 39.00)
            ctx.strokeStyle = 'rgba(255, 215, 0, 0.6)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(toMapX(11.21), toMapY(-68.25));
            ctx.lineTo(toMapX(11.21), toMapY(39.00));
            ctx.stroke();

            // Улица 2: от (-58.90, 40.79) до (80.00, 40.67)
            ctx.beginPath();
            ctx.moveTo(toMapX(-58.90), toMapY(40.79));
            ctx.lineTo(toMapX(80.00), toMapY(40.67));
            ctx.stroke();

            // Улица 3: от (-82.23, 14.79) до (48.55, 14.74)
            ctx.strokeStyle = 'rgba(255, 215, 0, 0.5)';
            ctx.beginPath();
            ctx.moveTo(toMapX(-82.23), toMapY(14.79));
            ctx.lineTo(toMapX(48.55), toMapY(14.74));
            ctx.stroke();

            // Улица 4: от (38.50, 68.23) до (39.35, 41.39)
            ctx.beginPath();
            ctx.moveTo(toMapX(38.50), toMapY(68.23));
            ctx.lineTo(toMapX(39.35), toMapY(41.39));
            ctx.stroke();

            // Улица 5: от (-57.58, 41.91) до (-57.21, -35.20)
            ctx.beginPath();
            ctx.moveTo(toMapX(-57.58), toMapY(41.91));
            ctx.lineTo(toMapX(-57.21), toMapY(-35.20));
            ctx.stroke();

            // Подписи улиц
            ctx.fillStyle = 'rgba(255, 215, 0, 0.35)';
            ctx.font = '7px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('Ул.1', toMapX(11.21), toMapY(-25));
            ctx.fillText('Ул.2', toMapX(10), toMapY(40.79) - 6);
            ctx.fillText('Ул.3', toMapX(-20), toMapY(14.79) - 6);
            ctx.fillText('Ул.4', toMapX(39), toMapY(55));
            ctx.fillText('Ул.5', toMapX(-57.4), toMapY(5));

            // Центр
            ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.beginPath();
            ctx.arc(toMapX(0), toMapY(0), 3, 0, Math.PI * 2);
            ctx.fill();

            // Машина
            if (currentCar && carLoaded) {
                const pos = currentCar.position;
                const px = toMapX(pos.x);
                const py = toMapY(pos.z);

                ctx.shadowColor = 'rgba(255, 107, 53, 0.5)';
                ctx.shadowBlur = 10;

                const gradient = ctx.createRadialGradient(px, py, 0, px, py, 6);
                gradient.addColorStop(0, '#ff6b35');
                gradient.addColorStop(1, 'rgba(255, 107, 53, 0)');
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(px, py, 6, 0, Math.PI * 2);
                ctx.fill();

                ctx.shadowBlur = 0;

                ctx.fillStyle = '#ff6b35';
                ctx.beginPath();
                ctx.arc(px, py, 2.5, 0, Math.PI * 2);
                ctx.fill();

                const angle = carState.rotation;
                const dirLen = 6;
                ctx.strokeStyle = '#ff6b35';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(px, py);
                ctx.lineTo(px + Math.sin(angle) * dirLen, py + Math.cos(angle) * dirLen);
                ctx.stroke();
            }

            ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.lineWidth = 1;
            ctx.strokeRect(0, 0, canvas.width, canvas.height);
        }

        // --------------------------------------------------------------
        // 14. АНИМАЦИОННЫЙ ЦИКЛ
        // --------------------------------------------------------------
        function animate() {
            requestAnimationFrame(animate);
            updateCar();
            updateCamera();
            updateMinimap();
            renderer.render(scene, camera);
        }
        animate();

        console.log('🏙️ Симулятор запущен с картой города и миникартой!');
        console.log(`📍 Размер поля: ${WORLD_SIZE}×${WORLD_SIZE}, центр (0, 0, 0)`);
        console.log('🗺️ Миникарта в правом верхнем углу показывает ваше местоположение');
        console.log('🔑 Промокоды: "танк" — TTTank, "мила" — Tiramisu SRM');
        console.log('📖 Управление: W/↑ — назад, S/↓ — вперёд, A/←, D/→ — руль, Пробел — ручник');
    </script>
</body>
