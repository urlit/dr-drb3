<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Гоночный симулятор — Moscotch 2141 & Subaru Outback</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0a1a;
            color: #fff;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            padding: 16px 24px;
            border-radius: 14px;
            border-left: 4px solid #ff6b35;
            pointer-events: none;
            user-select: none;
        }
        #ui h1 {
            font-size: 1.4rem;
            font-weight: 500;
        }
        #ui h1 span {
            color: #ff6b35;
        }
        #ui .sub {
            font-size: 0.85rem;
            opacity: 0.6;
            margin-top: 4px;
        }

        #carSelect {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            gap: 14px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            padding: 10px 20px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        #carSelect button {
            background: rgba(255, 255, 255, 0.06);
            border: none;
            color: #fff;
            padding: 8px 22px;
            border-radius: 30px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        #carSelect button:hover {
            background: rgba(255, 255, 255, 0.12);
        }
        #carSelect button.active {
            background: #ff6b35;
            border-color: #ff6b35;
            color: #fff;
            box-shadow: 0 0 20px rgba(255, 107, 53, 0.2);
        }

        #controlsHint {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.8rem;
            text-align: center;
            letter-spacing: 0.5px;
            background: rgba(0, 0, 0, 0.3);
            padding: 6px 16px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
            pointer-events: none;
            user-select: none;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            text-align: center;
            pointer-events: none;
        }
        #loading .spinner {
            width: 50px;
            height: 50px;
            margin: 0 auto 20px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #ff6b35;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        #loading p {
            font-size: 1.1rem;
            opacity: 0.7;
        }

        @media (max-width: 700px) {
            #ui { top: 12px; left: 12px; padding: 12px 16px; }
            #ui h1 { font-size: 1.1rem; }
            #carSelect { bottom: 20px; padding: 8px 14px; gap: 8px; flex-wrap: wrap; justify-content: center; }
            #carSelect button { font-size: 0.8rem; padding: 6px 14px; }
            #controlsHint { bottom: 80px; font-size: 0.7rem; padding: 4px 12px; }
        }
    </style>
</head>
<body>

    <div id="ui">
        <h1>🚗 <span id="carName">Moskotch 21 41</span></h1>
        <div class="sub">WASD — управление</div>
    </div>

    <div id="carSelect">
        <button id="btnMoskotch" class="active">Moskotch 21 41</button>
        <button id="btnSubaru">Siburoo Outblack</button>
    </div>

    <div id="controlsHint">W — вперёд &nbsp; S — назад &nbsp; A/D — поворот</div>

    <div id="loading">
        <div class="spinner"></div>
        <p>Загрузка моделей...</p>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // ---- Сцена, камера, рендерер ----
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);
        scene.fog = new THREE.Fog(0x1a1a2e, 100, 300);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 500);
        camera.position.set(0, 10, 15);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        // ---- Освещение ----
        const ambient = new THREE.AmbientLight(0x404060, 0.5);
        scene.add(ambient);

        const sun = new THREE.DirectionalLight(0xffeedd, 2.0);
        sun.position.set(20, 30, 10);
        sun.castShadow = true;
        sun.shadow.mapSize.width = 2048;
        sun.shadow.mapSize.height = 2048;
        sun.shadow.camera.near = 0.5;
        sun.shadow.camera.far = 100;
        sun.shadow.camera.left = -50;
        sun.shadow.camera.right = 50;
        sun.shadow.camera.top = 50;
        sun.shadow.camera.bottom = -50;
        scene.add(sun);

        const fill = new THREE.DirectionalLight(0x4488ff, 0.4);
        fill.position.set(-10, 5, -20);
        scene.add(fill);

        // ---- Карта (земля) ----
        const groundGeo = new THREE.PlaneGeometry(200, 200);
        const groundMat = new THREE.MeshStandardMaterial({
            color: 0x2a2a4a,
            roughness: 0.8,
            metalness: 0.1,
        });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.5;
        ground.receiveShadow = true;
        scene.add(ground);

        // Сетка для ориентира
        const grid = new THREE.GridHelper(200, 40, 0x6688ff, 0x334466);
        grid.position.y = -0.49;
        scene.add(grid);

        // Прозрачный круг в центре (стартовая точка)
        const circleGeo = new THREE.RingGeometry(1.5, 2.5, 32);
        const circleMat = new THREE.MeshStandardMaterial({
            color: 0xff6b35,
            transparent: true,
            opacity: 0.2,
            side: THREE.DoubleSide,
        });
        const circle = new THREE.Mesh(circleGeo, circleMat);
        circle.rotation.x = -Math.PI / 2;
        circle.position.set(0, -0.48, 0);
        scene.add(circle);

        // ---- Загрузчик моделей ----
        const loader = new GLTFLoader();
        const loadingDiv = document.getElementById('loading');

        // Хранилище моделей
        const cars = {
            moskotch: null,
            subaru: null
        };
        let activeCar = null; // ссылка на активную Mesh
        let activeName = 'moskotch';
        let carSpeed = 0;
        const maxSpeed = 0.3;
        const acceleration = 0.01;
        const friction = 0.98;
        const turnSpeed = 0.03;

        // Функция создания машины из gltf с масштабированием и настройкой
        function setupCar(gltf, scale = 1, pos = new THREE.Vector3(0, 0, 0), rotY = 0) {
            const model = gltf.scene;
            model.scale.set(scale, scale, scale);
            model.position.copy(pos);
            model.rotation.y = rotY;
            model.castShadow = true;
            model.receiveShadow = true;
            // Опционально: можно настроить материалы
            return model;
        }

        // Загружаем Москвич
        loader.load(
            'moskvich.glb',
            (gltf) => {
                const pos = new THREE.Vector3(-58.93, -0.08, -50.91);
                const rotY = 0.25; // поворот вправо
                const model = setupCar(gltf, 0.8, pos, rotY);
                cars.moskotch = model;
                scene.add(model);
                // Если это первая загруженная, делаем активной
                if (!activeCar) {
                    activeCar = model;
                    document.getElementById('carName').textContent = 'Moskotch 21 41';
                }
                checkLoading();
            },
            undefined,
            (err) => console.error('Ошибка загрузки Москвича:', err)
        );

        // Загружаем Subaru
        loader.load(
            'subaru_outback.glb',
            (gltf) => {
                const pos = new THREE.Vector3(0, 0, 0); // старт в центре
                const rotY = 0;
                const model = setupCar(gltf, 0.6, pos, rotY);
                cars.subaru = model;
                scene.add(model);
                // По умолчанию Subaru скрыта, если активен Москвич
                if (activeName !== 'subaru') {
                    model.visible = false;
                } else {
                    activeCar = model;
                    document.getElementById('carName').textContent = 'Siburoo Outblack';
                }
                checkLoading();
            },
            undefined,
            (err) => console.error('Ошибка загрузки Subaru:', err)
        );

        let loadedCount = 0;

        function checkLoading() {
            loadedCount++;
            if (loadedCount === 2) {
                loadingDiv.style.display = 'none';
                // Если активная машина ещё не установлена (например, Subaru загрузилась первой), установим Москвич
                if (!activeCar && cars.moskotch) {
                    activeCar = cars.moskotch;
                    cars.subaru.visible = false;
                    document.getElementById('carName').textContent = 'Moskotch 21 41';
                }
            }
        }

        // ---- Переключение машин ----
        const btnMoskotch = document.getElementById('btnMoskotch');
        const btnSubaru = document.getElementById('btnSubaru');

        function switchCar(name) {
            if (activeName === name) return;
            // Скрываем текущую
            if (activeCar) activeCar.visible = false;
            // Показываем новую
            const newCar = cars[name];
            if (!newCar) return;
            // Переносим новую машину на позицию старой (чтобы не было скачка)
            if (activeCar) {
                newCar.position.copy(activeCar.position);
                newCar.rotation.copy(activeCar.rotation);
            }
            newCar.visible = true;
            activeCar = newCar;
            activeName = name;
            // Обновляем название
            const nameMap = {
                moskotch: 'Moskotch 21 41',
                subaru: 'Siburoo Outblack'
            };
            document.getElementById('carName').textContent = nameMap[name];
            // Обновляем активную кнопку
            btnMoskotch.classList.toggle('active', name === 'moskotch');
            btnSubaru.classList.toggle('active', name === 'subaru');
        }

        btnMoskotch.addEventListener('click', () => switchCar('moskotch'));
        btnSubaru.addEventListener('click', () => switchCar('subaru'));

        // ---- Управление с клавиатуры ----
        const keys = {
            w: false,
            a: false,
            s: false,
            d: false,
            up: false,
            down: false,
            left: false,
            right: false
        };

        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w') keys.w = true;
            if (key === 'a') keys.a = true;
            if (key === 's') keys.s = true;
            if (key === 'd') keys.d = true;
            if (key === 'arrowup') keys.up = true;
            if (key === 'arrowdown') keys.down = true;
            if (key === 'arrowleft') keys.left = true;
            if (key === 'arrowright') keys.right = true;
            // Предотвращаем скролл страницы от стрелок
            if (['arrowup', 'arrowdown', 'arrowleft', 'arrowright'].includes(e.key)) {
                e.preventDefault();
            }
        });
        document.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w') keys.w = false;
            if (key === 'a') keys.a = false;
            if (key === 's') keys.s = false;
            if (key === 'd') keys.d = false;
            if (key === 'arrowup') keys.up = false;
            if (key === 'arrowdown') keys.down = false;
            if (key === 'arrowleft') keys.left = false;
            if (key === 'arrowright') keys.right = false;
        });

        // ---- Логика движения ----
        function updateCar() {
            if (!activeCar) return;

            // Определяем направление вперёд (локальная ось Z модели)
            const forward = new THREE.Vector3(0, 0, -1);
            forward.applyQuaternion(activeCar.quaternion);

            // Ускорение/торможение
            let accel = 0;
            if (keys.w || keys.up) accel = acceleration;
            if (keys.s || keys.down) accel = -acceleration;

            // Поворот
            let turn = 0;
            if (keys.a || keys.left) turn = turnSpeed;
            if (keys.d || keys.right) turn = -turnSpeed;

            // Применяем поворот к машине (вокруг оси Y)
            activeCar.rotation.y += turn;

            // Обновляем скорость
            carSpeed += accel;
            // Ограничиваем скорость
            if (carSpeed > maxSpeed) carSpeed = maxSpeed;
            if (carSpeed < -maxSpeed * 0.5) carSpeed = -maxSpeed * 0.5;
            // Трение
            if (!accel) carSpeed *= friction;
            if (Math.abs(carSpeed) < 0.001) carSpeed = 0;

            // Движение вперёд
            activeCar.position.x += forward.x * carSpeed;
            activeCar.position.z += forward.z * carSpeed;

            // Небольшое ограничение, чтобы не уехать за пределы карты
            const limit = 90;
            if (Math.abs(activeCar.position.x) > limit) activeCar.position.x = Math.sign(activeCar.position.x) * limit;
            if (Math.abs(activeCar.position.z) > limit) activeCar.position.z = Math.sign(activeCar.position.z) * limit;
        }

        // ---- Камера, следящая за машиной ----
        const cameraOffset = new THREE.Vector3(0, 6, -10); // сзади-сверху

        function updateCamera() {
            if (!activeCar) return;
            // Позиция камеры = позиция машины + смещение, повёрнутое вместе с машиной
            const offset = cameraOffset.clone();
            offset.applyQuaternion(activeCar.quaternion);
            const targetPos = activeCar.position.clone().add(offset);
            camera.position.lerp(targetPos, 0.1);
            camera.lookAt(activeCar.position);
        }

        // ---- Адаптация размера окна ----
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ---- Анимационный цикл ----
        function animate() {
            requestAnimationFrame(animate);
            updateCar();
            updateCamera();
            renderer.render(scene, camera);
        }
        animate();

        // ---- Вспомогательная инициализация, если модели уже загружены ----
        // Если по каким-то причинам активная машина не установлена, но модели загружены, выберем Москвич
        setTimeout(() => {
            if (!activeCar && cars.moskotch) {
                activeCar = cars.moskotch;
                cars.subaru.visible = false;
                document.getElementById('carName').textContent = 'Moskotch 21 41';
                btnMoskotch.classList.add('active');
                loadingDiv.style.display = 'none';
            }
        }, 3000);

        console.log('🚗 Симулятор запущен! Управляйте машиной клавишами WASD.');
        console.log('📍 Москвич стартует в (-58.93, -0.08, -50.91) с поворотом 0.25 рад.');
    </script>
</body>
</html>
