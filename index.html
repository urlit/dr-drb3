<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Городской симулятор</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: #87CEEB;
            color: white;
        }

        #hud {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 12px 24px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            text-align: center;
            pointer-events: none;
            user-select: none;
            min-width: 200px;
        }
        #hud .speed {
            font-size: 2rem;
            font-weight: 700;
            color: #ff6b35;
        }
        #hud .speed small {
            font-size: 1rem;
            font-weight: 400;
            color: #888;
        }
        #hud .coords {
            font-size: 0.8rem;
            color: #88ddff;
            font-family: 'Courier New', monospace;
            margin-top: 4px;
        }
        #hud .model-name {
            font-size: 0.9rem;
            color: #ff6b35;
            font-weight: 500;
            margin-top: 2px;
        }

        #controls-hint {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(6px);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 0.8rem;
            color: #aaa;
            border: 1px solid rgba(255, 255, 255, 0.05);
            pointer-events: none;
            user-select: none;
            white-space: nowrap;
        }
        #controls-hint strong {
            color: #fff;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            text-align: center;
            pointer-events: none;
        }
        #loading .spinner {
            width: 50px;
            height: 50px;
            margin: 0 auto 16px;
            border: 4px solid rgba(255, 255, 255, 0.08);
            border-top: 4px solid #ff6b35;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        #loading p {
            font-size: 1rem;
            opacity: 0.7;
        }

        #promoPanel {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 15;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            padding: 16px 24px;
            border-radius: 16px;
            border: 1px solid rgba(255, 107, 53, 0.3);
            text-align: center;
            display: none;
        }
        #promoPanel input {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 1rem;
            width: 200px;
            margin-right: 10px;
        }
        #promoPanel input:focus {
            outline: none;
            border-color: #ff6b35;
        }
        #promoPanel button {
            background: #ff6b35;
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.3s;
        }
        #promoPanel button:hover {
            background: #ff7a4a;
        }
        #promoPanel .close-btn {
            position: absolute;
            top: 4px;
            right: 10px;
            background: none;
            border: none;
            color: #888;
            font-size: 1.2rem;
            cursor: pointer;
        }
        #promoPanel .close-btn:hover {
            color: #fff;
        }

        #carSelector {
            position: absolute;
            top: 80px;
            right: 20px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 16px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 180px;
            max-height: calc(100vh - 200px);
            overflow-y: auto;
        }
        #carSelector h4 {
            color: #888;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
            text-align: center;
        }
        .car-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid transparent;
            color: #fff;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
            text-align: left;
            font-weight: 400;
            width: 100%;
        }
        .car-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        .car-btn.active {
            background: rgba(255, 107, 53, 0.2);
            border-color: #ff6b35;
        }
        .car-btn .emoji {
            margin-right: 8px;
        }
        .car-btn .credit {
            display: block;
            font-size: 0.5rem;
            color: #666;
            margin-top: 2px;
            padding-left: 4px;
            line-height: 1.3;
        }
        .car-btn .locked {
            color: #ff6b35;
            font-size: 0.6rem;
            margin-left: 6px;
        }

        #creditPanel {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(6px);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.6rem;
            color: #888;
            border: 1px solid rgba(255, 255, 255, 0.05);
            pointer-events: none;
            user-select: none;
            text-align: center;
            max-width: 90%;
            line-height: 1.4;
        }
        #creditPanel a {
            color: #88ccff;
            pointer-events: auto;
        }

        @media (max-width: 768px) {
            #hud { padding: 8px 16px; min-width: auto; width: 90%; bottom: 16px; }
            #hud .speed { font-size: 1.5rem; }
            #controls-hint { font-size: 0.6rem; padding: 6px 14px; white-space: normal; max-width: 90%; top: 12px; }
            #carSelector { top: 70px; right: 10px; padding: 12px; min-width: 140px; max-height: calc(100vh - 160px); }
            .car-btn { font-size: 0.75rem; padding: 6px 10px; }
            .car-btn .credit { font-size: 0.45rem; }
            #creditPanel { bottom: 80px; font-size: 0.5rem; padding: 4px 12px; }
            #promoPanel { top: 70px; padding: 12px 16px; width: 90%; }
            #promoPanel input { width: 140px; font-size: 0.85rem; }
        }
    </style>
</head>
<body>

    <div id="promoPanel">
        <button class="close-btn" id="closePromo">✕</button>
        <h4 style="color: #ff6b35; margin-bottom: 8px;">🎖️ СЕКРЕТНЫЙ ТАНК</h4>
        <p style="color: #aaa; font-size: 0.8rem; margin-bottom: 10px;">Введите промокод для доступа к TTTank</p>
        <input type="text" id="promoInput" placeholder="Введите промокод" />
        <button id="promoBtn">Активировать</button>
        <p id="promoError" style="color: #ff3355; font-size: 0.7rem; margin-top: 6px; display: none;">Неверный промокод!</p>
    </div>

    <div id="carSelector">
        <h4>🚗 Выбор машины</h4>
        <button class="car-btn active" data-car="bmw">
            <span class="emoji">🚗</span> BEEMWA 22
            <span class="credit">© tonielpro520 · CC BY</span>
        </button>
        <button class="car-btn" data-car="bmw30">
            <span class="emoji">🚗</span> BEEMWA 30
            <span class="credit">© ROH3D · CC BY</span>
        </button>
        <button class="car-btn" data-car="nissan">
            <span class="emoji">🚘</span> Neasun Loral 2rbo
            <span class="credit">© own.guest · CC BY</span>
        </button>
        <button class="car-btn" data-car="mercedes">
            <span class="emoji">🚙</span> Tantoya Korova
            <span class="credit">© danieljorge435 · CC BY</span>
        </button>
        <button class="car-btn" data-car="toyota">
            <span class="emoji">🚗</span> Tantoya Parmezan
            <span class="credit">© Daniel Zhabotinsky · CC BY</span>
        </button>
        <button class="car-btn" data-car="pagani">
            <span class="emoji">🏎️</span> Poganka Sport
            <span class="credit">© Ajay Gawde · CC BY</span>
        </button>
        <button class="car-btn" data-car="simbiro">
            <span class="emoji">🚗</span> Simbiro Backo
            <span class="credit">Free Standard</span>
        </button>
        <button class="car-btn" data-car="tank" id="tankBtn">
            <span class="emoji">🎖️</span> TTTank
            <span class="locked">🔒</span>
            <span class="credit">© Kolos Studios · CC BY</span>
        </button>
    </div>

    <div id="controls-hint">
        <strong>W / ↑</strong> — вперёд &nbsp;·&nbsp; <strong>S / ↓</strong> — назад &nbsp;·&nbsp; <strong>A / ←</strong> &nbsp;<strong>D / →</strong> — руль &nbsp;·&nbsp; <strong>Пробел</strong> — ручник
    </div>

    <div id="creditPanel">
        🚗 Модели: 
        <span id="creditText">BEEMWA 22 — © tonielpro520 · CC BY</span>
    </div>

    <div id="hud">
        <div class="speed"><span id="speedDisplay">0</span> <small>км/ч</small></div>
        <div class="coords" id="coordDisplay">📍 0.00 · 0.00 · 0.00</div>
        <div class="model-name" id="modelNameDisplay">🚗 BEEMWA 22</div>
    </div>

    <div id="loading">
        <div class="spinner"></div>
        <p id="loadStatus">Загрузка...</p>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --------------------------------------------------------------
        // 1. СЦЕНА, КАМЕРА, РЕНДЕРЕР
        // --------------------------------------------------------------
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 3, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.5;
        document.body.appendChild(renderer.domElement);

        // --------------------------------------------------------------
        // 2. ОСВЕЩЕНИЕ
        // --------------------------------------------------------------
        const sunLight = new THREE.DirectionalLight(0xffeedd, 2.5);
        sunLight.position.set(10, 15, 8);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 2048;
        sunLight.shadow.mapSize.height = 2048;
        sunLight.shadow.camera.near = 0.1;
        sunLight.shadow.camera.far = 60;
        sunLight.shadow.camera.left = -30;
        sunLight.shadow.camera.right = 30;
        sunLight.shadow.camera.top = 30;
        sunLight.shadow.camera.bottom = -30;
        scene.add(sunLight);

        const fillLight = new THREE.DirectionalLight(0x88ccff, 0.8);
        fillLight.position.set(-5, 3, -8);
        scene.add(fillLight);

        const ambientLight = new THREE.AmbientLight(0x88bbdd, 0.8);
        scene.add(ambientLight);

        // --------------------------------------------------------------
        // 3. ПОЛ
        // --------------------------------------------------------------
        const canvas = document.createElement('canvas');
        canvas.width = 512;
        canvas.height = 512;
        const ctx = canvas.getContext('2d');
        
        ctx.fillStyle = '#4a8c3f';
        ctx.fillRect(0, 0, 512, 512);
        
        for (let i = 0; i < 30000; i++) {
            const x = Math.random() * 512;
            const y = Math.random() * 512;
            const size = 1 + Math.random() * 3;
            const green = 100 + Math.random() * 80;
            ctx.fillStyle = `rgb(50, ${green}, 30)`;
            ctx.fillRect(x, y, size, size);
        }
        
        const texture = new THREE.CanvasTexture(canvas);
        texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
        texture.repeat.set(30, 30);

        const groundGeo = new THREE.PlaneGeometry(80, 80);
        const groundMat = new THREE.MeshStandardMaterial({
            map: texture,
            roughness: 0.8,
            metalness: 0.0,
        });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.5;
        ground.receiveShadow = true;
        scene.add(ground);

        const gridHelper = new THREE.GridHelper(40, 20, 0x88dd88, 0x44aa44);
        gridHelper.position.y = -0.48;
        scene.add(gridHelper);

        const markerGeo = new THREE.RingGeometry(0.4, 0.6, 32);
        const markerMat = new THREE.MeshBasicMaterial({
            color: 0xff6b35,
            side: THREE.DoubleSide,
            transparent: true,
            opacity: 0.3,
        });
        const marker = new THREE.Mesh(markerGeo, markerMat);
        marker.rotation.x = -Math.PI / 2;
        marker.position.y = -0.47;
        scene.add(marker);

        // --------------------------------------------------------------
        // 4. ПРОМОКОД
        // --------------------------------------------------------------
        let tankUnlocked = false;

        document.getElementById('promoBtn').addEventListener('click', () => {
            const input = document.getElementById('promoInput');
            const error = document.getElementById('promoError');
            
            if (input.value.toLowerCase() === 'thetank') {
                tankUnlocked = true;
                document.getElementById('promoPanel').style.display = 'none';
                document.getElementById('tankBtn').innerHTML = 
                    '<span class="emoji">🎖️</span> TTTank' +
                    '<span class="credit">© Kolos Studios · CC BY</span>';
                document.getElementById('tankBtn').dataset.unlocked = 'true';
                document.querySelectorAll('.car-btn').forEach(b => b.style.opacity = '1');
                alert('🎖️ TTTank разблокирован!');
            } else {
                error.style.display = 'block';
                setTimeout(() => { error.style.display = 'none'; }, 3000);
            }
        });

        document.getElementById('closePromo').addEventListener('click', () => {
            document.getElementById('promoPanel').style.display = 'none';
        });

        setTimeout(() => {
            document.getElementById('promoPanel').style.display = 'block';
        }, 1000);

        // --------------------------------------------------------------
        // 5. ЗАГРУЗКА МОДЕЛЕЙ
        // --------------------------------------------------------------
        const loader = new GLTFLoader();
        const loadingDiv = document.getElementById('loading');
        const loadStatus = document.getElementById('loadStatus');

        let currentCar = null;
        let carLoaded = false;
        let currentModelId = 'bmw';

        const carState = {
            position: new THREE.Vector3(0, 0, 0),
            velocity: new THREE.Vector3(0, 0, 0),
            rotation: 0,
        };

        const ENGINE_FORCE = 0.025;
        const REVERSE_FORCE = 0.015;
        const MAX_SPEED = 0.5;
        const TURN_SPEED = 0.03;
        const FRICTION = 0.98;
        const TANK_MAX_SPEED = 0.23;

        const keys = {
            w: false,
            s: false,
            a: false,
            d: false,
            up: false,
            down: false,
            left: false,
            right: false,
            space: false,
        };

        // Список моделей — BEEMWA 30 и TTTank развёрнуты на 180°
        const modelsList = [
            { 
                id: 'bmw', 
                name: '🚗 BEEMWA 22', 
                file: 'bmw2002.glb', 
                rotation: 0,
                credit: '"1968 BMW 2002" (https://skfb.ly/pFqYn) by tonielpro520 is licensed under Creative Commons Attribution (http://creativecommons.org/licenses/by/4.0/)'
            },
            { 
                id: 'bmw30', 
                name: '🚗 BEEMWA 30', 
                file: 'BEEMWAPP3.glb', 
                rotation: Math.PI, // 180°
                credit: '"Low Poly Car - BMW E30 1985 White" (https://skfb.ly/o8EBR) by ROH3D is licensed under Creative Commons Attribution (http://creativecommons.org/licenses/by/4.0/)'
            },
            { 
                id: 'nissan', 
                name: '🚘 Neasun Loral 2rbo', 
                file: 'nissan_laurel.glb', 
                rotation: Math.PI / 2,
                credit: '"Nissan Laurel C31 Turbo 85\'" (https://skfb.ly/6SoPW) by own.guest is licensed under Creative Commons Attribution (http://creativecommons.org/licenses/by/4.0/)'
            },
            { 
                id: 'mercedes', 
                name: '🚙 Tantoya Korova', 
                file: 'gelik.glb', 
                rotation: 0,
                credit: '"Toyota Corola" (https://skfb.ly/6RHQA) by danieljorge435 is licensed under Creative Commons Attribution (http://creativecommons.org/licenses/by/4.0/)'
            },
            { 
                id: 'toyota', 
                name: '🚗 Tantoya Parmezan', 
                file: 'toyota_tezzo.glb', 
                rotation: -Math.PI / 2,
                credit: '"Tozzo \'98 - Low poly model" (https://skfb.ly/pB6Xs) by Daniel Zhabotinsky is licensed under Creative Commons Attribution (http://creativecommons.org/licenses/by/4.0/)'
            },
            { 
                id: 'pagani', 
                name: '🏎️ Poganka Sport', 
                file: 'pagani1.glb', 
                rotation: 0,
                credit: '"Pagani Zonda Cinque" (https://skfb.ly/oBt9O) by Ajay Gawde is licensed under Creative Commons Attribution (http://creativecommons.org/licenses/by/4.0/)'
            },
            { 
                id: 'simbiro', 
                name: '🚗 Simbiro Backo', 
                file: 'simbiro.glb', 
                rotation: 0,
                credit: 'Free Standard'
            },
            { 
                id: 'tank', 
                name: '🎖️ TTTank', 
                file: 'low_poly_tank.glb', 
                rotation: Math.PI, // 180°
                credit: '"Low Poly Tank" (https://skfb.ly/6YNSy) by Kolos Studios is licensed under Creative Commons Attribution (http://creativecommons.org/licenses/by/4.0/)',
                isTank: true
            }
        ];

        const loadedModels = {};

        function loadModel(modelId, filePath) {
            return new Promise((resolve, reject) => {
                const modelInfo = modelsList.find(m => m.id === modelId);
                loadStatus.textContent = `Загрузка ${modelInfo.name}...`;

                loader.load(
                    filePath,
                    (gltf) => {
                        const model = gltf.scene;

                        const box = new THREE.Box3().setFromObject(model);
                        const size = box.getSize(new THREE.Vector3());
                        const maxDim = Math.max(size.x, size.y, size.z);
                        const targetSize = 2.0;
                        if (maxDim > 0.01) {
                            const s = targetSize / maxDim;
                            model.scale.set(s, s, s);
                        }

                        const center = new THREE.Vector3();
                        box.getCenter(center);
                        model.position.sub(center);
                        
                        const newBox = new THREE.Box3().setFromObject(model);
                        const minY = newBox.min.y;
                        model.position.y = -minY;

                        model.rotation.y = modelInfo.rotation || 0;

                        model.traverse((child) => {
                            if (child.isMesh) {
                                child.castShadow = true;
                                child.receiveShadow = true;
                                if (child.material) {
                                    child.material.roughness = 0.3;
                                    child.material.metalness = 0.5;
                                }
                            }
                        });

                        scene.add(model);
                        resolve(model);
                    },
                    (xhr) => {
                        const percent = Math.round((xhr.loaded / xhr.total) * 100);
                        loadStatus.textContent = `Загрузка... ${percent}%`;
                    },
                    (error) => {
                        console.error('Ошибка загрузки:', error);
                        reject(error);
                    }
                );
            });
        }

        async function init() {
            try {
                const modelsToLoad = modelsList.filter(m => m.id !== 'tank');
                
                for (const model of modelsToLoad) {
                    try {
                        const modelObj = await loadModel(model.id, model.file);
                        loadedModels[model.id] = modelObj;
                        if (model.id !== modelsList[0].id) {
                            modelObj.visible = false;
                        }
                        console.log(`✅ ${model.name} загружен`);
                    } catch (e) {
                        console.warn(`❌ Ошибка загрузки ${model.name}:`, e);
                    }
                }

                const firstModel = modelsList[0];
                if (loadedModels[firstModel.id]) {
                    currentCar = loadedModels[firstModel.id];
                    currentModelId = firstModel.id;
                    carLoaded = true;
                    document.getElementById('modelNameDisplay').textContent = firstModel.name;
                    document.getElementById('creditText').textContent = firstModel.credit;
                }

                loadingDiv.style.display = 'none';
                console.log('✅ Все модели загружены!');
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                loadingDiv.innerHTML = `
                    <p style="color: #ff6b35; font-weight: 500;">
                        ❌ Не удалось загрузить модели.<br>
                        Проверьте пути к файлам.
                    </p>
                `;
            }
        }

        init();

        // --------------------------------------------------------------
        // 6. ЗАГРУЗКА ТАНКА ПО ПРОМОКОДУ
        // --------------------------------------------------------------
        async function loadTank() {
            try {
                const modelObj = await loadModel('tank', 'low_poly_tank.glb');
                loadedModels['tank'] = modelObj;
                modelObj.visible = false;
                console.log('✅ TTTank загружен и ожидает активации!');
            } catch (e) {
                console.warn('❌ Ошибка загрузки танка:', e);
            }
        }

        loadTank();

        // --------------------------------------------------------------
        // 7. ВЫБОР МАШИНЫ
        // --------------------------------------------------------------
        document.querySelectorAll('.car-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const id = btn.dataset.car;
                
                if (id === 'tank' && !tankUnlocked) {
                    document.getElementById('promoPanel').style.display = 'block';
                    return;
                }
                
                if (!loadedModels[id]) return;

                if (currentCar) {
                    currentCar.visible = false;
                }

                currentCar = loadedModels[id];
                currentCar.visible = true;
                currentModelId = id;
                
                document.querySelectorAll('.car-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                const modelInfo = modelsList.find(m => m.id === id);
                document.getElementById('modelNameDisplay').textContent = modelInfo.name;
                document.getElementById('creditText').textContent = modelInfo.credit;

                carState.position.set(0, 0, 0);
                carState.velocity.set(0, 0, 0);
                carState.rotation = 0;
                currentCar.position.set(0, 0, 0);
                currentCar.rotation.y = modelInfo.rotation || 0;
            });
        });

        // --------------------------------------------------------------
        // 8. УПРАВЛЕНИЕ
        // --------------------------------------------------------------
        document.addEventListener('keydown', (e) => {
            const key = e.key;
            
            if (key === 'w' || key === 'W') { keys.w = true; e.preventDefault(); }
            if (key === 's' || key === 'S') { keys.s = true; e.preventDefault(); }
            if (key === 'a' || key === 'A') { keys.a = true; e.preventDefault(); }
            if (key === 'd' || key === 'D') { keys.d = true; e.preventDefault(); }
            
            if (key === 'ArrowUp') { keys.up = true; e.preventDefault(); }
            if (key === 'ArrowDown') { keys.down = true; e.preventDefault(); }
            if (key === 'ArrowLeft') { keys.left = true; e.preventDefault(); }
            if (key === 'ArrowRight') { keys.right = true; e.preventDefault(); }
            
            if (key === ' ') { keys.space = true; e.preventDefault(); }
        });

        document.addEventListener('keyup', (e) => {
            const key = e.key;
            
            if (key === 'w' || key === 'W') { keys.w = false; e.preventDefault(); }
            if (key === 's' || key === 'S') { keys.s = false; e.preventDefault(); }
            if (key === 'a' || key === 'A') { keys.a = false; e.preventDefault(); }
            if (key === 'd' || key === 'D') { keys.d = false; e.preventDefault(); }
            
            if (key === 'ArrowUp') { keys.up = false; e.preventDefault(); }
            if (key === 'ArrowDown') { keys.down = false; e.preventDefault(); }
            if (key === 'ArrowLeft') { keys.left = false; e.preventDefault(); }
            if (key === 'ArrowRight') { keys.right = false; e.preventDefault(); }
            
            if (key === ' ') { keys.space = false; e.preventDefault(); }
        });

        function updateCar() {
            if (!currentCar || !carLoaded) return;

            const { position, velocity, rotation } = carState;
            const modelInfo = modelsList.find(m => m.id === currentModelId);
            const isTank = modelInfo ? modelInfo.isTank : false;

            let acceleration = 0;
            let turn = 0;

            if (keys.w || keys.up) {
                acceleration = ENGINE_FORCE;
            }
            if (keys.s || keys.down) {
                acceleration = -REVERSE_FORCE;
            }
            if (keys.a || keys.left) turn = TURN_SPEED;
            if (keys.d || keys.right) turn = -TURN_SPEED;

            if (Math.abs(velocity.length()) > 0.005) {
                carState.rotation += turn;
            }

            const forward = new THREE.Vector3(-Math.sin(rotation), 0, -Math.cos(rotation));
            velocity.add(forward.clone().multiplyScalar(acceleration));

            const currentSpeed = velocity.length();
            const maxSpeed = isTank ? TANK_MAX_SPEED : MAX_SPEED;
            if (currentSpeed > maxSpeed) {
                velocity.multiplyScalar(maxSpeed / currentSpeed);
            }

            velocity.multiplyScalar(FRICTION);

            if (velocity.length() < 0.001) {
                velocity.set(0, 0, 0);
            }

            position.add(velocity);

            const BOUNDARY = 35;
            if (Math.abs(position.x) > BOUNDARY) {
                position.x = Math.sign(position.x) * BOUNDARY;
                velocity.x = 0;
            }
            if (Math.abs(position.z) > BOUNDARY) {
                position.z = Math.sign(position.z) * BOUNDARY;
                velocity.z = 0;
            }

            currentCar.position.copy(position);
            
            const baseRotation = modelInfo ? modelInfo.rotation || 0 : 0;
            currentCar.rotation.y = rotation + baseRotation;

            if (Math.abs(turn) > 0.001 && velocity.length() > 0.05) {
                const tilt = -turn * velocity.length() * 0.5;
                currentCar.rotation.z = tilt;
            } else {
                currentCar.rotation.z *= 0.9;
            }

            currentCar.position.y = 0 + Math.sin(Date.now() / 500) * 0.002;

            const speedKmh = Math.round(velocity.length() * 150);
            document.getElementById('speedDisplay').textContent = speedKmh;

            document.getElementById('coordDisplay').textContent =
                `📍 ${position.x.toFixed(2)} · ${position.y.toFixed(2)} · ${position.z.toFixed(2)}`;
        }

        // --------------------------------------------------------------
        // 9. КАМЕРА ОТ ТРЕТЬЕГО ЛИЦА
        // --------------------------------------------------------------
        const CAMERA_DISTANCE_MIN = 4.5;
        const CAMERA_DISTANCE_MAX = 6.5;
        const CAMERA_HEIGHT = 3.2;
        const CAMERA_SMOOTH = 0.08;

        let cameraTarget = new THREE.Vector3(0, 0.5, 0);

        function updateCamera() {
            if (!currentCar || !carLoaded) return;

            const carPos = currentCar.position.clone();
            
            const speed = carState.velocity.length();
            const distanceFactor = Math.min(speed / MAX_SPEED, 1);
            const currentDistance = CAMERA_DISTANCE_MIN + (CAMERA_DISTANCE_MAX - CAMERA_DISTANCE_MIN) * distanceFactor * 0.5;
            
            const angle = carState.rotation;
            const offset = new THREE.Vector3(
                -Math.sin(angle) * currentDistance,
                CAMERA_HEIGHT,
                -Math.cos(angle) * currentDistance
            );
            
            const desiredPos = carPos.clone().add(offset);
            camera.position.lerp(desiredPos, CAMERA_SMOOTH);

            const lookTarget = carPos.clone();
            lookTarget.y += 0.5;
            cameraTarget.lerp(lookTarget, CAMERA_SMOOTH);
            camera.lookAt(cameraTarget);
        }

        // --------------------------------------------------------------
        // 10. АДАПТАЦИЯ ПОД ОКНО
        // --------------------------------------------------------------
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --------------------------------------------------------------
        // 11. АНИМАЦИОННЫЙ ЦИКЛ
        // --------------------------------------------------------------
        function animate() {
            requestAnimationFrame(animate);

            updateCar();
            updateCamera();

            renderer.render(scene, camera);
        }
        animate();

        console.log('🚗 Симулятор запущен!');
        console.log('📍 Все машины в центре (0, 0, 0)');
        console.log('🎖️ TTTank разблокируется по промокоду "thetank"');
        console.log('🔄 BEEMWA 30 и TTTank развёрнуты на 180°');
        console.log('📖 Управление: W/↑-вперёд, S/↓-назад, A/←-влево, D/→-вправо, Пробел-ручник');
    </script>
</body>
</html>
