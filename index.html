<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Москвич 2141 — 3D-симулятор</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: #0a0a1a;
            color: white;
        }

        #hud {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 12px 24px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            text-align: center;
            pointer-events: none;
            user-select: none;
            min-width: 200px;
        }
        #hud .speed {
            font-size: 2rem;
            font-weight: 700;
            color: #ff6b35;
        }
        #hud .speed small {
            font-size: 1rem;
            font-weight: 400;
            color: #888;
        }
        #hud .coords {
            font-size: 0.8rem;
            color: #88ddff;
            font-family: 'Courier New', monospace;
            margin-top: 4px;
        }

        #controls-hint {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(6px);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 0.8rem;
            color: #aaa;
            border: 1px solid rgba(255, 255, 255, 0.05);
            pointer-events: none;
            user-select: none;
            white-space: nowrap;
        }
        #controls-hint strong {
            color: #fff;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            text-align: center;
            pointer-events: none;
        }
        #loading .spinner {
            width: 50px;
            height: 50px;
            margin: 0 auto 16px;
            border: 4px solid rgba(255, 255, 255, 0.08);
            border-top: 4px solid #ff6b35;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        #loading p {
            font-size: 1rem;
            opacity: 0.7;
        }

        @media (max-width: 768px) {
            #hud { padding: 8px 16px; min-width: auto; width: 90%; bottom: 16px; }
            #hud .speed { font-size: 1.5rem; }
            #controls-hint { font-size: 0.6rem; padding: 6px 14px; white-space: normal; max-width: 90%; top: 12px; }
        }
    </style>
</head>
<body>

    <div id="controls-hint">
        <strong>W</strong> — газ &nbsp;·&nbsp; <strong>S</strong> — тормоз/задний ход &nbsp;·&nbsp; <strong>A/D</strong> — руль &nbsp;·&nbsp; <strong>Пробел</strong> — ручник
    </div>

    <div id="hud">
        <div class="speed"><span id="speedDisplay">0</span> <small>км/ч</small></div>
        <div class="coords" id="coordDisplay">📍 0.00 · 0.00 · 0.00</div>
    </div>

    <div id="loading">
        <div class="spinner"></div>
        <p>Загрузка Москвича...</p>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --------------------------------------------------------------
        // 1. СЦЕНА, КАМЕРА, РЕНДЕРЕР
        // --------------------------------------------------------------
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);
        scene.fog = new THREE.Fog(0x1a1a2e, 20, 50); // Туман для атмосферы

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 5, 8);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        // --------------------------------------------------------------
        // 2. ОСВЕЩЕНИЕ
        // --------------------------------------------------------------
        const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffeedd, 2.5);
        dirLight.position.set(10, 15, 10);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 4096;
        dirLight.shadow.mapSize.height = 4096;
        dirLight.shadow.camera.near = 0.1;
        dirLight.shadow.camera.far = 60;
        dirLight.shadow.camera.left = -30;
        dirLight.shadow.camera.right = 30;
        dirLight.shadow.camera.top = 30;
        dirLight.shadow.camera.bottom = -30;
        scene.add(dirLight);

        const hemiLight = new THREE.HemisphereLight(0x87ceeb, 0x362d1e, 0.6);
        scene.add(hemiLight);

        // --------------------------------------------------------------
        // 3. ПОЛ (большое поле)
        // --------------------------------------------------------------
        // Текстура травы (создаём procedural)
        const canvas = document.createElement('canvas');
        canvas.width = 512;
        canvas.height = 512;
        const ctx = canvas.getContext('2d');
        
        // Зелёный фон
        ctx.fillStyle = '#2d5a1e';
        ctx.fillRect(0, 0, 512, 512);
        
        // Трава (случайные точки)
        for (let i = 0; i < 20000; i++) {
            const x = Math.random() * 512;
            const y = Math.random() * 512;
            const size = 1 + Math.random() * 2;
            const green = 80 + Math.random() * 80;
            ctx.fillStyle = `rgb(40, ${green}, 20)`;
            ctx.fillRect(x, y, size, size);
        }
        
        const texture = new THREE.CanvasTexture(canvas);
        texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
        texture.repeat.set(20, 20);

        const groundGeo = new THREE.PlaneGeometry(60, 60);
        const groundMat = new THREE.MeshStandardMaterial({
            map: texture,
            roughness: 0.9,
            metalness: 0.0,
        });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.5;
        ground.receiveShadow = true;
        scene.add(ground);

        // Сетка для ориентации
        const gridHelper = new THREE.GridHelper(40, 40, 0x88ff88, 0x44aa44);
        gridHelper.position.y = -0.48;
        scene.add(gridHelper);

        // --------------------------------------------------------------
        // 4. ЗАГРУЗКА МОДЕЛИ МОСКВИЧА
        // --------------------------------------------------------------
        const loader = new GLTFLoader();
        const loadingDiv = document.getElementById('loading');

        let car = null;
        let carLoaded = false;

        // Координаты спавна
        const SPAWN_POS = new THREE.Vector3(-47.14, 0.32, -40.72);

        loader.load(
            'moskvich.glb',
            (gltf) => {
                car = gltf.scene;

                // Масштабирование
                const box = new THREE.Box3().setFromObject(car);
                const size = box.getSize(new THREE.Vector3());
                const maxDim = Math.max(size.x, size.y, size.z);
                const targetSize = 2.0;
                if (maxDim > 0.01) {
                    const s = targetSize / maxDim;
                    car.scale.set(s, s, s);
                }

                // Центрируем и ставим на спавн
                const center = new THREE.Vector3();
                box.getCenter(center);
                car.position.sub(center);
                
                // Ставим на точку спавна
                car.position.x = SPAWN_POS.x;
                car.position.y = SPAWN_POS.y;
                car.position.z = SPAWN_POS.z;

                // Тени
                car.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                        // Добавляем немного блеска кузову
                        if (child.material) {
                            child.material.roughness = 0.3;
                            child.material.metalness = 0.6;
                        }
                    }
                });

                scene.add(car);
                carLoaded = true;
                loadingDiv.style.display = 'none';

                console.log('✅ Москвич загружен на позиции:', SPAWN_POS);
            },
            (xhr) => {
                const percent = Math.round((xhr.loaded / xhr.total) * 100);
                const p = loadingDiv.querySelector('p');
                if (p) p.textContent = `Загрузка Москвича... ${percent}%`;
            },
            (error) => {
                console.error('Ошибка загрузки:', error);
                loadingDiv.innerHTML = `
                    <p style="color: #ff6b35; font-weight: 500;">
                        ❌ Не удалось загрузить модель.<br>
                        Проверьте путь к файлу <code>moskvich.glb</code>.
                    </p>
                `;
            }
        );

        // --------------------------------------------------------------
        // 5. ФИЗИКА АВТОМОБИЛЯ
        // --------------------------------------------------------------
        const carState = {
            position: new THREE.Vector3(SPAWN_POS.x, SPAWN_POS.y, SPAWN_POS.z),
            velocity: new THREE.Vector3(0, 0, 0),
            rotation: 0, // угол поворота в радианах
            speed: 0,
        };

        // Параметры управления
        const ENGINE_FORCE = 0.15;
        const BRAKE_FORCE = 0.08;
        const MAX_SPEED = 0.8;
        const TURN_SPEED = 0.035;
        const FRICTION = 0.97;
        const DRIFT_FRICTION = 0.92;

        const keys = {
            w: false,
            s: false,
            a: false,
            d: false,
            space: false,
        };

        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key in keys) {
                keys[key] = true;
                e.preventDefault();
            }
            if (e.key === ' ') {
                keys.space = true;
                e.preventDefault();
            }
        });

        document.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (key in keys) {
                keys[key] = false;
                e.preventDefault();
            }
            if (e.key === ' ') {
                keys.space = false;
                e.preventDefault();
            }
        });

        function updateCar() {
            if (!car || !carLoaded) return;

            const { position, velocity, rotation } = carState;

            // --- Управление ---
            let acceleration = 0;
            let turn = 0;

            // Газ
            if (keys.w) {
                acceleration = ENGINE_FORCE;
            }
            // Тормоз/задний ход
            if (keys.s) {
                if (Math.abs(velocity.length()) < 0.05) {
                    // Если почти стоим - едем назад
                    acceleration = -ENGINE_FORCE * 0.6;
                } else {
                    acceleration = -BRAKE_FORCE;
                }
            }

            // Руль
            if (keys.a) turn = TURN_SPEED;
            if (keys.d) turn = -TURN_SPEED;

            // Ручник (дрифт)
            const isDrifting = keys.space;
            const friction = isDrifting ? DRIFT_FRICTION : FRICTION;

            // --- Применяем физику ---
            // Поворачиваем только если едем
            if (Math.abs(velocity.length()) > 0.01) {
                carState.rotation += turn * (velocity.length() / 0.5);
            }

            // Двигаем вперёд/назад относительно поворота
            const forward = new THREE.Vector3(-Math.sin(carState.rotation), 0, -Math.cos(carState.rotation));
            
            // Добавляем ускорение
            velocity.add(forward.multiplyScalar(acceleration));

            // Ограничиваем скорость
            if (velocity.length() > MAX_SPEED) {
                velocity.normalize().multiplyScalar(MAX_SPEED);
            }

            // Трение
            velocity.multiplyScalar(friction);

            // Останавливаем если почти ноль
            if (velocity.length() < 0.001) {
                velocity.set(0, 0, 0);
            }

            // Обновляем позицию
            position.add(velocity);

            // Ограничиваем поле
            const BOUNDARY = 25;
            if (Math.abs(position.x) > BOUNDARY) {
                position.x = Math.sign(position.x) * BOUNDARY;
                velocity.x = 0;
            }
            if (Math.abs(position.z) > BOUNDARY) {
                position.z = Math.sign(position.z) * BOUNDARY;
                velocity.z = 0;
            }

            // --- Применяем трансформации к модели ---
            car.position.copy(position);
            car.rotation.y = carState.rotation;

            // Наклон при повороте (немного реализма)
            if (Math.abs(turn) > 0.01 && velocity.length() > 0.1) {
                const tilt = -turn * velocity.length() * 0.3;
                car.rotation.z = tilt;
            } else {
                car.rotation.z *= 0.9;
            }

            // Лёгкая подвеска
            car.position.y = SPAWN_POS.y + Math.sin(Date.now() / 500) * 0.002;

            // --- Обновляем HUD ---
            const speedKmh = Math.round(velocity.length() * 120);
            document.getElementById('speedDisplay').textContent = speedKmh;

            document.getElementById('coordDisplay').textContent =
                `📍 ${position.x.toFixed(2)} · ${position.y.toFixed(2)} · ${position.z.toFixed(2)}`;
        }

        // --------------------------------------------------------------
        // 6. КАМЕРА ОТ ТРЕТЬЕГО ЛИЦА
        // --------------------------------------------------------------
        let cameraOffset = new THREE.Vector3(0, 4, 7);
        let cameraTarget = new THREE.Vector3(0, 1, 0);

        function updateCamera() {
            if (!car || !carLoaded) return;

            // Позиция камеры относительно машины
            const carPos = car.position.clone();
            
            // Смещаем камеру назад и вверх
            const offset = new THREE.Vector3(
                -Math.sin(carState.rotation) * 7,
                4,
                -Math.cos(carState.rotation) * 7
            );
            
            // Плавное следование камеры
            const desiredPos = carPos.clone().add(offset);
            camera.position.lerp(desiredPos, 0.08);

            // Смотрим на машину
            const lookTarget = carPos.clone();
            lookTarget.y += 0.5;
            cameraTarget.lerp(lookTarget, 0.08);
            camera.lookAt(cameraTarget);
        }

        // --------------------------------------------------------------
        // 7. АДАПТАЦИЯ ПОД ОКНО
        // --------------------------------------------------------------
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --------------------------------------------------------------
        // 8. АНИМАЦИОННЫЙ ЦИКЛ
        // --------------------------------------------------------------
        function animate() {
            requestAnimationFrame(animate);

            updateCar();
            updateCamera();

            renderer.render(scene, camera);
        }
        animate();

        console.log('🚗 Москвич 2141 — симулятор запущен!');
        console.log('📍 Точка спавна:', SPAWN_POS);
        console.log('📖 Управление: W-газ, S-тормоз, A/D-руль, Пробел-ручник');
    </script>
</body>
</html>
