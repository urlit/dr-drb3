<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Subaru Outback — 3D-симулятор</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: #0a0a1a;
            color: white;
        }

        #hud {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 12px 24px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            text-align: center;
            pointer-events: none;
            user-select: none;
            min-width: 200px;
        }
        #hud .speed {
            font-size: 2rem;
            font-weight: 700;
            color: #ff6b35;
        }
        #hud .speed small {
            font-size: 1rem;
            font-weight: 400;
            color: #888;
        }
        #hud .coords {
            font-size: 0.8rem;
            color: #88ddff;
            font-family: 'Courier New', monospace;
            margin-top: 4px;
        }

        #controls-hint {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(6px);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 0.8rem;
            color: #aaa;
            border: 1px solid rgba(255, 255, 255, 0.05);
            pointer-events: none;
            user-select: none;
            white-space: nowrap;
        }
        #controls-hint strong {
            color: #fff;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            text-align: center;
            pointer-events: none;
        }
        #loading .spinner {
            width: 50px;
            height: 50px;
            margin: 0 auto 16px;
            border: 4px solid rgba(255, 255, 255, 0.08);
            border-top: 4px solid #ff6b35;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        #loading p {
            font-size: 1rem;
            opacity: 0.7;
        }

        /* Кнопка переключения модели */
        #switchBtn {
            position: absolute;
            top: 80px;
            right: 20px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: white;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
            pointer-events: auto;
        }
        #switchBtn:hover {
            background: rgba(255, 107, 53, 0.3);
            border-color: #ff6b35;
        }

        @media (max-width: 768px) {
            #hud { padding: 8px 16px; min-width: auto; width: 90%; bottom: 16px; }
            #hud .speed { font-size: 1.5rem; }
            #controls-hint { font-size: 0.6rem; padding: 6px 14px; white-space: normal; max-width: 90%; top: 12px; }
            #switchBtn { top: 70px; right: 10px; padding: 8px 14px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>

    <button id="switchBtn">🚗 Переключить на Москвич</button>

    <div id="controls-hint">
        <strong>W</strong> — газ &nbsp;·&nbsp; <strong>S</strong> — тормоз/задний ход &nbsp;·&nbsp; <strong>A/D</strong> — руль &nbsp;·&nbsp; <strong>Пробел</strong> — ручник
    </div>

    <div id="hud">
        <div class="speed"><span id="speedDisplay">0</span> <small>км/ч</small></div>
        <div class="coords" id="coordDisplay">📍 0.00 · 0.00 · 0.00</div>
    </div>

    <div id="loading">
        <div class="spinner"></div>
        <p id="loadStatus">Загрузка Subaru Outback...</p>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --------------------------------------------------------------
        // 1. СЦЕНА, КАМЕРА, РЕНДЕРЕР
        // --------------------------------------------------------------
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 8);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        // --------------------------------------------------------------
        // 2. ОСВЕЩЕНИЕ
        // --------------------------------------------------------------
        const ambientLight = new THREE.AmbientLight(0x404060, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffeedd, 2.5);
        dirLight.position.set(6, 10, 6);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.bias = -0.001;
        dirLight.shadow.camera.near = 0.1;
        dirLight.shadow.camera.far = 100;
        dirLight.shadow.camera.left = -20;
        dirLight.shadow.camera.right = 20;
        dirLight.shadow.camera.top = 20;
        dirLight.shadow.camera.bottom = -20;
        scene.add(dirLight);

        const backLight = new THREE.DirectionalLight(0x4488ff, 0.6);
        backLight.position.set(-4, 2, -6);
        scene.add(backLight);

        const fillLight = new THREE.PointLight(0xff6633, 0.4, 15);
        fillLight.position.set(0, -1, 3);
        scene.add(fillLight);

        // --------------------------------------------------------------
        // 3. ПОЛ (большая карта)
        // --------------------------------------------------------------
        const groundGeo = new THREE.PlaneGeometry(100, 100);
        const groundMat = new THREE.ShadowMaterial({
            opacity: 0.3,
            color: 0x000000,
        });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.5;
        ground.receiveShadow = true;
        scene.add(ground);

        // Большая сетка
        const gridHelper = new THREE.GridHelper(60, 30, 0x6666aa, 0x333355);
        gridHelper.position.y = -0.49;
        scene.add(gridHelper);

        // Маркер в центре
        const markerGeo = new THREE.RingGeometry(0.4, 0.6, 32);
        const markerMat = new THREE.MeshBasicMaterial({
            color: 0xff6b35,
            side: THREE.DoubleSide,
            transparent: true,
            opacity: 0.3,
        });
        const marker = new THREE.Mesh(markerGeo, markerMat);
        marker.rotation.x = -Math.PI / 2;
        marker.position.y = -0.48;
        scene.add(marker);

        // Оси для ориентации
        const axesHelper = new THREE.AxesHelper(5);
        axesHelper.position.y = -0.45;
        scene.add(axesHelper);

        // --------------------------------------------------------------
        // 4. ЗАГРУЗКА МОДЕЛЕЙ
        // --------------------------------------------------------------
        const loader = new GLTFLoader();
        const loadingDiv = document.getElementById('loading');
        const loadStatus = document.getElementById('loadStatus');

        let currentCar = null;
        let currentModel = 'subaru';
        let carLoaded = false;

        // Состояние машины
        const carState = {
            position: new THREE.Vector3(0, 0, 0),
            velocity: new THREE.Vector3(0, 0, 0),
            rotation: 0,
        };

        // Параметры управления
        const ENGINE_FORCE = 0.08;
        const BRAKE_FORCE = 0.05;
        const MAX_SPEED = 0.5;
        const TURN_SPEED = 0.03;
        const FRICTION = 0.98;

        const keys = {
            w: false,
            s: false,
            a: false,
            d: false,
            space: false,
        };

        // Функция загрузки модели
        function loadModel(modelName, path) {
            return new Promise((resolve, reject) => {
                loadStatus.textContent = `Загрузка ${modelName === 'subaru' ? 'Subaru Outback' : 'Москвич 2141'}...`;

                loader.load(
                    path,
                    (gltf) => {
                        const model = gltf.scene;

                        // Масштабируем
                        const box = new THREE.Box3().setFromObject(model);
                        const size = box.getSize(new THREE.Vector3());
                        const maxDim = Math.max(size.x, size.y, size.z);
                        const targetSize = 2.0;
                        if (maxDim > 0.01) {
                            const s = targetSize / maxDim;
                            model.scale.set(s, s, s);
                        }

                        // Центрируем модель
                        const center = new THREE.Vector3();
                        box.getCenter(center);
                        model.position.sub(center);
                        
                        // Ставим в центр (0, 0, 0)
                        model.position.x = 0;
                        model.position.y = 0;
                        model.position.z = 0;

                        // Тени
                        model.traverse((child) => {
                            if (child.isMesh) {
                                child.castShadow = true;
                                child.receiveShadow = true;
                            }
                        });

                        scene.add(model);
                        resolve(model);
                    },
                    (xhr) => {
                        const percent = Math.round((xhr.loaded / xhr.total) * 100);
                        loadStatus.textContent = `Загрузка... ${percent}%`;
                    },
                    (error) => {
                        console.error('Ошибка загрузки:', error);
                        reject(error);
                    }
                );
            });
        }

        // Загружаем Subaru
        let subaruModel = null;
        let moskvichModel = null;

        async function init() {
            try {
                subaruModel = await loadModel('subaru', 'subaru_outback.glb');
                currentCar = subaruModel;
                carLoaded = true;
                loadingDiv.style.display = 'none';
                console.log('✅ Subaru Outback загружен в центре (0, 0, 0)');
                
                // Загружаем Москвич в фоне
                try {
                    moskvichModel = await loadModel('moskvich', 'moskvich.glb');
                    moskvichModel.visible = false;
                    console.log('✅ Москвич загружен в фоне');
                } catch (e) {
                    console.warn('Москвич не загружен:', e);
                }
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                loadingDiv.innerHTML = `
                    <p style="color: #ff6b35; font-weight: 500;">
                        ❌ Не удалось загрузить модель.<br>
                        Проверьте путь к файлу <code>subaru_outback.glb</code>.
                    </p>
                `;
            }
        }

        init();

        // --------------------------------------------------------------
        // 5. ПЕРЕКЛЮЧЕНИЕ МОДЕЛЕЙ
        // --------------------------------------------------------------
        const switchBtn = document.getElementById('switchBtn');
        let isSubaru = true;

        switchBtn.addEventListener('click', () => {
            if (!subaruModel || !moskvichModel) return;

            // Скрываем текущую
            if (isSubaru) {
                subaruModel.visible = false;
                moskvichModel.visible = true;
                currentCar = moskvichModel;
                switchBtn.textContent = '🚗 Переключить на Subaru';
                document.querySelector('#controls-hint').innerHTML = 
                    '<strong>W</strong> — газ &nbsp;·&nbsp; <strong>S</strong> — тормоз/задний ход &nbsp;·&nbsp; <strong>A/D</strong> — руль &nbsp;·&nbsp; <strong>Пробел</strong> — ручник &nbsp;·&nbsp; 🚗 Москвич';
            } else {
                subaruModel.visible = true;
                moskvichModel.visible = false;
                currentCar = subaruModel;
                switchBtn.textContent = '🚗 Переключить на Москвич';
                document.querySelector('#controls-hint').innerHTML = 
                    '<strong>W</strong> — газ &nbsp;·&nbsp; <strong>S</strong> — тормоз/задний ход &nbsp;·&nbsp; <strong>A/D</strong> — руль &nbsp;·&nbsp; <strong>Пробел</strong> — ручник &nbsp;·&nbsp; 🚙 Subaru';
            }
            
            isSubaru = !isSubaru;
            
            // Сбрасываем позицию при переключении
            carState.position.set(0, 0, 0);
            carState.velocity.set(0, 0, 0);
            carState.rotation = 0;
            if (currentCar) {
                currentCar.position.set(0, 0, 0);
                currentCar.rotation.y = 0;
            }
        });

        // --------------------------------------------------------------
        // 6. УПРАВЛЕНИЕ
        // --------------------------------------------------------------
        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w' || key === 's' || key === 'a' || key === 'd') {
                keys[key] = true;
                e.preventDefault();
            }
            if (e.key === ' ') {
                keys.space = true;
                e.preventDefault();
            }
        });

        document.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w' || key === 's' || key === 'a' || key === 'd') {
                keys[key] = false;
                e.preventDefault();
            }
            if (e.key === ' ') {
                keys.space = false;
                e.preventDefault();
            }
        });

        function updateCar() {
            if (!currentCar || !carLoaded) return;

            const { position, velocity, rotation } = carState;

            let acceleration = 0;
            let turn = 0;

            if (keys.w) {
                acceleration = ENGINE_FORCE;
            }
            
            if (keys.s) {
                acceleration = -ENGINE_FORCE * 0.5;
            }

            if (keys.a) turn = TURN_SPEED;
            if (keys.d) turn = -TURN_SPEED;

            if (Math.abs(velocity.length()) > 0.01) {
                carState.rotation += turn;
            }

            const forward = new THREE.Vector3(-Math.sin(rotation), 0, -Math.cos(rotation));
            velocity.add(forward.clone().multiplyScalar(acceleration));

            const currentSpeed = velocity.length();
            if (currentSpeed > MAX_SPEED) {
                velocity.multiplyScalar(MAX_SPEED / currentSpeed);
            }

            velocity.multiplyScalar(FRICTION);

            if (velocity.length() < 0.001) {
                velocity.set(0, 0, 0);
            }

            position.add(velocity);

            const BOUNDARY = 45;
            if (Math.abs(position.x) > BOUNDARY) {
                position.x = Math.sign(position.x) * BOUNDARY;
                velocity.x = 0;
            }
            if (Math.abs(position.z) > BOUNDARY) {
                position.z = Math.sign(position.z) * BOUNDARY;
                velocity.z = 0;
            }

            currentCar.position.copy(position);
            currentCar.rotation.y = rotation;

            if (Math.abs(turn) > 0.001 && velocity.length() > 0.05) {
                const tilt = -turn * velocity.length() * 0.5;
                currentCar.rotation.z = tilt;
            } else {
                currentCar.rotation.z *= 0.9;
            }

            currentCar.position.y = 0 + Math.sin(Date.now() / 500) * 0.002;

            const speedKmh = Math.round(velocity.length() * 150);
            document.getElementById('speedDisplay').textContent = speedKmh;

            document.getElementById('coordDisplay').textContent =
                `📍 ${position.x.toFixed(2)} · ${position.y.toFixed(2)} · ${position.z.toFixed(2)}`;
        }

        // --------------------------------------------------------------
        // 7. КАМЕРА ОТ ТРЕТЬЕГО ЛИЦА
        // --------------------------------------------------------------
        let cameraTarget = new THREE.Vector3(0, 0.5, 0);

        function updateCamera() {
            if (!currentCar || !carLoaded) return;

            const carPos = currentCar.position.clone();
            
            const offset = new THREE.Vector3(
                -Math.sin(carState.rotation) * 6,
                4,
                -Math.cos(carState.rotation) * 6
            );
            
            const desiredPos = carPos.clone().add(offset);
            camera.position.lerp(desiredPos, 0.1);

            const lookTarget = carPos.clone();
            lookTarget.y += 0.5;
            cameraTarget.lerp(lookTarget, 0.1);
            camera.lookAt(cameraTarget);
        }

        // --------------------------------------------------------------
        // 8. АДАПТАЦИЯ ПОД ОКНО
        // --------------------------------------------------------------
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --------------------------------------------------------------
        // 9. АНИМАЦИОННЫЙ ЦИКЛ
        // --------------------------------------------------------------
        function animate() {
            requestAnimationFrame(animate);

            updateCar();
            updateCamera();

            renderer.render(scene, camera);
        }
        animate();

        console.log('🚙 Subaru Outback — симулятор запущен!');
        console.log('📍 Спавн в центре (0, 0, 0)');
        console.log('📖 Управление: W-газ, S-тормоз, A/D-руль, Пробел-ручник');
        console.log('🔄 Кнопка справа переключает на Москвич');
    </script>
</body>
</html>
